name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Same order as the local hooks (lefthook.yml): cheapest signal first, slowest last.
      - name: Format and imports
        run: npm run check:ci
      - name: Lint
        run: npm run lint
      - name: Types
        run: npm run typecheck
      - name: Tests
        run: npm test

      # No secrets here on purpose: the site reads its key at request time, never at build time.
      - name: Build without an API key
        run: npm run build
